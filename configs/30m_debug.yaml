seed: 42
run_name: diffusionkun_30m_debug

paths:
  train_jsonl: data/cleaned/zh_en.train.jsonl
  dev_jsonl: data/cleaned/zh_en.dev.jsonl
  spm_model: data/tokenized/diffusionkun_zh_en_32k.model
  output_dir: checkpoints/30m_debug

data:
  src_lang: zh
  tgt_lang: en
  max_src_len: 128
  max_tgt_len: 128
  num_workers: 4

model:
  vocab_size: 32000
  d_model: 384
  encoder_layers: 4
  decoder_layers: 6
  heads: 6
  ffn_dim: 1536
  dropout: 0.1
  max_src_len: 128
  max_tgt_len: 128

training:
  precision: bf16
  batch_size: 64
  grad_accum_steps: 1
  max_steps: 5000
  lr: 3.0e-4
  min_lr: 1.0e-5
  warmup_steps: 300
  weight_decay: 0.01
  grad_clip: 1.0
  log_every: 20
  eval_every: 500
  save_every: 1000

diffusion:
  noise_min: 0.05
  noise_max: 0.995
  mask_replace_prob: 0.9
  random_replace_prob: 0.1
  decode_steps: 12

loss:
  masked_ce_weight: 1.0
  unmasked_ce_weight: 0.0
  length_loss_weight: 0.5
